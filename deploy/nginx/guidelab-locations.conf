# Include these blocks before the SPA `location /` block.
# Replace 10.0.0.20 with the AI server's private address. If AI runs locally,
# use 127.0.0.1 instead.

location = /api {
    return 301 /api/;
}

location ^~ /api/ {
    proxy_pass http://127.0.0.1:8000/;
    proxy_http_version 1.1;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    # Browsers authenticate with the signed HttpOnly cookie.  Never accept a
    # client-forged internal Agent header through the public Nginx entrypoint.
    proxy_set_header X-GuideLab-Session "";

    client_max_body_size 100m;
    proxy_connect_timeout 10s;
    proxy_send_timeout 180s;
    proxy_read_timeout 180s;
}

location = /ai {
    return 301 /ai/;
}

location ^~ /ai/ {
    proxy_pass http://127.0.0.1:8001/;
    proxy_http_version 1.1;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-GuideLab-Session "";

    proxy_connect_timeout 10s;
    proxy_send_timeout 300s;
    proxy_read_timeout 300s;
    proxy_buffering off;
    proxy_cache off;
    gzip off;
}
